<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function () {
      try {
        var t = localStorage.getItem('roly-theme');
        if (t !== 'dark' && t !== 'light') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        var l = localStorage.getItem('roly-lang');
        if (l === 'es') document.documentElement.lang = 'es';
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
    </script>
    <meta name="theme-color" content="#FBFAF7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0B1526" media="(prefers-color-scheme: dark)">
    <title data-i18n="404.meta.title">Page Not Found | Roly Home Services</title>
    <meta name="robots" content="noindex, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <style>
        .nf-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            gap: 8px;
        }
        .nf-code {
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 800;
            line-height: 1;
            color: var(--color-navy);
            letter-spacing: -2px;
        }
        .nf-code span { color: var(--color-orange); }
        .nf-title { font-size: clamp(1.4rem, 4vw, 2rem); color: var(--text-primary); margin: 8px 0 4px; }
        .nf-text { color: var(--text-secondary); max-width: 30rem; margin: 0 auto 24px; line-height: 1.6; }
        .nf-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .nf-logo { margin-bottom: 28px; }
    </style>
        <script defer src="i18n/es/common.js"></script>
    <script defer src="i18n/es/app-strings.js"></script>
    <script defer src="i18n/es/404.js"></script>
    <script defer src="i18n/i18n.js"></script>
    <link rel="icon" type="image/png" href="assets/brand/favicon.png">
    <link rel="apple-touch-icon" href="assets/brand/apple-touch-icon.png">
</head>
<body>
    <div class="header-actions nf-toggles">
        <button type="button" class="header-toggle lang-toggle" aria-pressed="false" aria-label="Switch to Spanish" data-i18n-attr="aria-label:common.toggle.lang">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke-width="2"/><path stroke-width="2" d="M3 12h18M12 3c2.5 2.6 3.8 5.7 3.8 9s-1.3 6.4-3.8 9c-2.5-2.6-3.8-5.7-3.8-9s1.3-6.4 3.8-9z"/></svg>
            <span class="lang-toggle-label">ES</span>
        </button>
        <button type="button" class="header-toggle theme-toggle" aria-pressed="false" aria-label="Toggle dark mode" data-i18n-attr="aria-label:common.toggle.theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke-width="2"/><path stroke-width="2" stroke-linecap="round" d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path stroke-width="2" stroke-linejoin="round" d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        </button>
    </div>
    <main class="nf-wrap">
        <a href="index.html" class="logo-wrapper nf-logo">
            <span class="logo-mark" aria-hidden="true"><img src="assets/brand/logo-roly-mark.webp" alt="Roly Home Services" class="brand-logo-img"></span>
            <div>
                <span class="logo-text">Roly<span> Home Services</span></span>
                <p class="logo-slogan" data-i18n="common.logo.slogan">Your Property Best Friend</p>
            </div>
        </a>
        <div class="nf-code">4<span>0</span>4</div>
        <h1 class="nf-title" data-i18n="404.title">This page needs a fresh coat</h1>
        <p class="nf-text" data-i18n="404.text">We couldn't find the page you were looking for. Let's get you back to a finished surface.</p>
        <div class="nf-actions">
            <a href="index.html" class="btn btn-primary" data-i18n="404.actions.home">Back to Home</a>
            <a href="contact.html" class="btn btn-outline" data-i18n="404.actions.estimate">Get a Free Estimate</a>
        </div>
    </main>
</body>
</html>
